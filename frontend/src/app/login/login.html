<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    
    <div class="form-group">
      <label>Usuario:</label>
      <input type="text" [(ngModel)]="username" placeholder="Ingresa tu usuario" />
    </div>

    <div class="form-group">
      <label>Contraseña:</label>
      <input type="password" [(ngModel)]="password" placeholder="Ingresa tu contraseña" />
    </div>

    <button (click)="login()">Ingresar</button>
  </div>
</div>
